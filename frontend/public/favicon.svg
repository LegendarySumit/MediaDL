<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1f2937"/>
  
  <!-- Play button icon -->
  <g transform="translate(25, 20)">
    <!-- Triangle (play icon) -->
    <polygon points="0,0 50,30 0,60" fill="#ef4444"/>
    
    <!-- Download arrow -->
    <g transform="translate(55, 25)">
      <line x1="0" y1="0" x2="0" y2="25" stroke="#3b82f6" stroke-width="3"/>
      <polygon points="0,25 -5,18 5,18" fill="#3b82f6"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="50" y="85" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff" font-family="Arial">DL</text>
</svg>